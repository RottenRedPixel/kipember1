services:
  - type: web
    name: memory-wiki
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    disk:
      name: memory-wiki-data
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: memory-wiki-db
          property: connectionString
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: UPLOADS_FALLBACK_BASE_URL
        value: https://memory-wiki.onrender.com
      - key: R2_BUCKET
        value: ember-media-prod
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: RETELL_FROM_NUMBER
        sync: false
      - key: ELEVENLABS
        sync: false
      - key: MAILGUN_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

databases:
  - name: memory-wiki-db
    plan: basic-256mb
    diskSizeGB: 10
